<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Soul Relief AI</title>
    <style>
        body { background: #eef2f5; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        #app { width: 400px; background: white; border-radius: 25px; display: flex; flex-direction: column; height: 80vh; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 15px; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .bot { background: #f1f1f1; align-self: flex-start; margin-right: 20px; }
        .user { background: #0084ff; color: white; align-self: flex-end; margin-left: 20px; text-align: right; }
        .box { padding: 15px; border-top: 1px solid #eee; display: flex; }
        input { flex: 1; border: none; background: #f0f2f5; padding: 10px; border-radius: 10px; outline: none; }
        button { background: none; border: none; cursor: pointer; font-size: 20px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="chat" style="display: flex; flex-direction: column;">
        <div class="msg bot">Привет. Если включишь VPN, я точно смогу тебе ответить. Попробуем?</div>
    </div>
    <div class="box">
        <input id="in" placeholder="Пиши тут">
        <button id="go">❤</button>
    </div>
</div>

<script>
    // Твой ключ, который ты скинул ранее
    const KEY = "AIzaSyCPl-chmFiUe6rkKM3F5suc4G7SHHrHn8c"; 
    const chat = document.getElementById('chat');
    const input = document.getElementById('in');

    async function send() {
        const val = input.value;
        if(!val) return;

        add(val, 'user');
        input.value = '';

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Ты добрый психолог. Ответь на это: " + val }] }]
                })
            });

            const data = await res.json();
            
            if(data.candidates && data.candidates[0]) {
                add(data.candidates[0].content.parts[0].text, 'bot');
            } else {
                console.log(data); // Посмотри это в консоли (F12)
                add("Error code 106❌. Включите VPN на своём устройстве, ваш регион не поддерживаеться в этом приложении", "bot");
            }
        } catch (e) {
            add("Ошибка сети. Без VPN Google может блокировать запросы.", "bot");
        }
    }

    function add(t, cls) {
        const d = document.createElement('div');
        d.className = 'msg ' + cls;
        d.innerText = t;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('go').onclick = send;
    input.onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>

</body>
</html>
