<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Relief AI - Qutqaruvchi</title>
    <style>
        :root { --accent: #0084ff; --bg: #eef2f5; --bot-msg: #f1f1f1; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #app { width: 100%; max-width: 450px; background: white; border-radius: 30px; display: flex; flex-direction: column; height: 90vh; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* Исправление бага с длинными словами */
        .msg { 
            max-width: 80%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 15px; 
            line-height: 1.5; 
            word-wrap: break-word; /* */
            position: relative;
        }

        .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 5px; color: #333; }
        .user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }

        .typing { font-size: 12px; color: #999; margin-left: 20px; display: none; margin-bottom: 10px; }

        .box { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        input { flex: 1; border: none; background: #f0f2f5; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 15px; }
        
        button { background: var(--accent); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        button:hover { transform: scale(1.1); background: #0073e6; }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="app">
    <div id="chat">
        <div class="msg bot">Привет! Я AI Qutqaruvchi. Я здесь, чтобы выслушать тебя. Что у тебя на душе?</div>
    </div>
    <div id="typing" class="typing">ИИ подбирает слова поддержки...</div>
    <div class="box">
        <input id="in" type="text" placeholder="Написать" autocomplete="off">
        <button id="go">Отправить</button>
    </div>
</div>

<script>
    //[cite: 1] В идеале ключ должен быть на бэкенде. 
    // Для GitHub Pages это временное решение.
    const _0x5a1 = "AIzaSyCPl-chmFiUe6rkKM3F5suc4G7SHHrHn8c"; 
    
    const chat = document.getElementById('chat');
    const input = document.getElementById('in');
    const btn = document.getElementById('go');
    const typingIndicator = document.getElementById('typing');

    async function send() {
        const val = input.value.trim();
        if(!val) return;

        add(val, 'user');
        input.value = '';
        typingIndicator.style.display = 'block';

        try {
            // Добавляем System Prompt для роли психолога
            const systemPrompt = `Ты — добрый AI-помощник психолог "AI Qutqaruvchi". 
            Твоя цель: поддерживать людей в трудной ситуации. 
            Отвечай кратко, спокойно, с большой заботой. 
            Если человек говорит о самоповреждении, мягко посоветуй обратиться к специалисту.
            Сообщение пользователя: `;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_0x5a1}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt + val }] }]
                })
            });

            const data = await res.json();
            
            if(data.candidates && data.candidates[0]) {
                const aiText = data.candidates[0].content.parts[0].text;
                add(aiText, 'bot');
            } else {
                add("Извини, мне нужно немного времени, чтобы прийти в себя. (Ошибка доступа)", "bot");
            }
        } catch (e) {
            add("Прости, возникли неполадки с сетью. Проверь VPN.", "bot");
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    function add(t, cls) {
        const d = document.createElement('div');
        d.className = 'msg ' + cls;
        d.innerText = t;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = send;
    input.onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>

</body>
</html>
